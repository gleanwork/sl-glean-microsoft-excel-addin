<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-label="Clarifying questions">
  <rect width="960" height="600" fill="#F6F3EB"/>
  <rect x="60" y="70" width="840" height="420" rx="26" fill="#fff" stroke="#dedbd1"/>
  <text x="95" y="120" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#62615d">Glean</text>
  <text x="95" y="155" font-family="Arial, sans-serif" font-size="20" fill="#171717">I need two quick choices before I add more rows.</text>
  <rect x="95" y="195" width="770" height="250" rx="20" fill="#F0EFFF" stroke="#c9c6ff"/>
  <text x="125" y="235" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#171717">Glean needs a bit more context</text>
  <text x="125" y="260" font-family="Arial, sans-serif" font-size="14" fill="#62615d">Answer 2 quick questions to continue.</text>
  <text x="125" y="305" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#171717">1 Which topics should I prioritize?</text>
  <rect x="125" y="325" width="175" height="32" rx="16" fill="#fff" stroke="#dedbd1"/>
  <text x="212" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#171717">Solutions Library</text>
  <rect x="315" y="325" width="205" height="32" rx="16" fill="#E8E7FF" stroke="#343CED"/>
  <text x="417" y="346" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#343CED">Partner/AWS work</text>
  <text x="125" y="390" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#171717">2 What type of rows do you want?</text>
  <rect x="125" y="410" width="210" height="32" rx="16" fill="#fff" stroke="#dedbd1"/>
  <text x="230" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#171717">Net-new ideas</text>
  <rect x="350" y="410" width="230" height="32" rx="16" fill="#E8E7FF" stroke="#343CED"/>
  <text x="465" y="431" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#343CED">Balanced mix</text>
</svg>
