<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-label="Workbook context preview">
  <rect width="960" height="600" fill="#F6F3EB"/>
  <text x="40" y="55" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#171717">Glean in Excel</text>
  <rect x="40" y="90" width="880" height="72" rx="22" fill="#F0EFFF" stroke="#c9c6ff"/>
  <circle cx="70" cy="126" r="14" fill="#343CED"/>
  <text x="70" y="131" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">i</text>
  <text x="100" y="120" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#171717">Workbook preview is capped</text>
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="14" fill="#62615d">Glean will see up to 25 rows x 15 columns per sheet.</text>
  <rect x="40" y="205" width="880" height="300" rx="22" fill="#fff" stroke="#dedbd1"/>
  <text x="65" y="245" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#171717">Selected range preview</text>
  <rect x="65" y="265" width="86" height="26" rx="13" fill="#F8F7F2"/>
  <text x="108" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#62615d">B3:F40</text>
  <rect x="160" y="265" width="110" height="26" rx="13" fill="#F8F7F2"/>
  <text x="215" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="700" fill="#62615d">25 x 15 preview</text>
  <rect x="65" y="320" width="830" height="120" rx="12" fill="#fff" stroke="#dedbd1"/>
  <rect x="65" y="320" width="830" height="34" fill="#F0EFFF"/>
  <text x="88" y="342" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#171717">Col 1</text>
  <text x="205" y="342" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#171717">Col 2</text>
  <text x="322" y="342" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#171717">Col 3</text>
  <text x="88" y="382" font-family="Arial, sans-serif" font-size="13" fill="#171717">Project</text>
  <text x="205" y="382" font-family="Arial, sans-serif" font-size="13" fill="#171717">Area</text>
  <text x="322" y="382" font-family="Arial, sans-serif" font-size="13" fill="#171717">Latest activity</text>
</svg>
